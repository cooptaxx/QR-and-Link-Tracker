<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Tracker App</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      background: #f7f7f7;
      color: #222;
    }

    h1, h2 {
      margin-bottom: 10px;
    }

    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 20px;
    }

    input, select, button {
      padding: 10px;
      margin: 6px 0;
      font-size: 14px;
      width: 100%;
      box-sizing: border-box;
    }

    button {
      cursor: pointer;
      background: #222;
      color: white;
      border: none;
      border-radius: 8px;
    }

    button:hover {
      background: #444;
    }

    .event {
      border-bottom: 1px solid #eee;
      padding: 12px 0;
    }

    .small {
      font-size: 12px;
      color: #666;
    }

    .tracking-link {
      display: inline-block;
      margin-top: 6px;
      word-break: break-all;
    }

    .event-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .event-actions button,
    .event-actions a {
      width: auto;
    }

    .link-btn {
      display: inline-block;
      padding: 10px 14px;
      background: #eee;
      color: #222;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
    }

    .link-btn:hover {
      background: #ddd;
    }

    #message {
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 15px;
      display: none;
    }

    #message.show {
      display: block;
    }

    #message.error {
      background: #fdeaea;
      color: #a33;
    }

    #message.success {
      background: #eaf7ea;
      color: #2f6b2f;
    }

    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-bg.open {
      display: flex;
    }

    .modal-box {
      background: white;
      border-radius: 12px;
      padding: 20px;
      width: 90%;
      max-width: 360px;
      text-align: center;
    }

    .modal-box canvas {
      margin: 16px auto;
      display: block;
    }

    .modal-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .modal-sub {
      font-size: 12px;
      color: #666;
      word-break: break-all;
      margin-bottom: 12px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .modal-actions button {
      width: auto;
    }

    .redirecting {
      font-family: Arial, sans-serif;
      padding: 30px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>QR Tracker App</h1>
  <p>This version connects to Supabase, lets you create campaigns and events, tracks clicks, and generates QR codes.</p>

  <div id="message"></div>

  <div class="card">
    <h2>Add Campaign</h2>
    <input type="text" id="campaign-name" placeholder="Campaign name" />
    <button onclick="addCampaign()">Add Campaign</button>
  </div>

  <div class="card">
    <h2>Add Event</h2>
    <input type="text" id="event-name" placeholder="Event name" />
    <input type="text" id="event-url" placeholder="Destination URL" />
    <select id="campaign-select">
      <option value="">Select a campaign</option>
    </select>
    <button onclick="addEvent()">Add Event</button>
  </div>

  <div class="card">
    <h2>Campaigns</h2>
    <div id="campaign-list">Loading campaigns...</div>
  </div>

  <div class="card">
    <h2>Events</h2>
    <div id="event-list">Loading events...</div>
  </div>

  <div class="modal-bg" id="qr-modal">
    <div class="modal-box">
      <div class="modal-title" id="qr-title">QR Code</div>
      <div class="modal-sub" id="qr-subtitle"></div>
      <div id="qr-render"></div>
      <div class="modal-actions">
        <button onclick="downloadQR()">Download PNG</button>
        <button onclick="closeQRModal()">Close</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://fsnjpxyeqbctmffhkelv.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_5WySpn-4drNBRgC3c9Kcxg_GSj6ow-R';

    const headers = {
      apikey: SUPABASE_KEY,
      Authorization: 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      Prefer: 'return=representation'
    };

    let campaigns = [];
    let events = [];
    let activeQrEvent = null;

    function showMessage(text, type = 'success') {
      const box = document.getElementById('message');
      box.textContent = text;
      box.className = 'show ' + type;
    }

    function clearMessage() {
      const box = document.getElementById('message');
      box.textContent = '';
      box.className = '';
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getTrackingLink(eventId) {
      const base = window.location.href.split('?')[0];
      return base + '?id=' + encodeURIComponent(eventId);
    }

    async function loadCampaigns() {
      try {
        const res = await fetch(
          SUPABASE_URL + '/rest/v1/campaigns?select=*&order=created_at.asc',
          { headers }
        );

        if (!res.ok) {
          const errText = await res.text();
          throw new Error('Could not load campaigns: ' + errText);
        }

        campaigns = await res.json();
        renderCampaigns();
        populateCampaignDropdown();
      } catch (err) {
        showMessage(err.message, 'error');
        document.getElementById('campaign-list').innerHTML = 'Could not load campaigns.';
      }
    }

    function renderCampaigns() {
      const list = document.getElementById('campaign-list');

      if (!campaigns.length) {
        list.innerHTML = 'No campaigns found yet.';
        return;
      }

      list.innerHTML = campaigns.map(c => `
        <div class="event">
          <strong>${escapeHtml(c.name)}</strong><br>
          <span class="small">ID: ${escapeHtml(c.id)}</span>
        </div>
      `).join('');
    }

    function populateCampaignDropdown() {
      const select = document.getElementById('campaign-select');

      select.innerHTML =
        '<option value="">Select a campaign</option>' +
        campaigns.map(c => `<option value="${escapeHtml(c.id)}">${escapeHtml(c.name)}</option>`).join('');
    }

    async function loadEvents() {
      try {
        const res = await fetch(
          SUPABASE_URL + '/rest/v1/events?select=*&order=created_at.asc',
          { headers }
        );

        if (!res.ok) {
          const errText = await res.text();
          throw new Error('Could not load events: ' + errText);
        }

        events = await res.json();
        renderEvents();
      } catch (err) {
        showMessage(err.message, 'error');
        document.getElementById('event-list').innerHTML = 'Could not load events.';
      }
    }

    function getCampaignName(campaignId) {
      const campaign = campaigns.find(c => c.id === campaignId);
      return campaign ? campaign.name : 'Unknown campaign';
    }

    function renderEvents() {
      const list = document.getElementById('event-list');

      if (!events.length) {
        list.innerHTML = 'No events found yet.';
        return;
      }

      list.innerHTML = events.map(e => {
        const trackingLink = getTrackingLink(e.id);

        return `
          <div class="event">
            <strong>${escapeHtml(e.name)}</strong><br>
            <span>${escapeHtml(e.url)}</span><br>
            <span class="small">Campaign: ${escapeHtml(getCampaignName(e.campaign_id))}</span><br>
            <span class="small">Clicks: ${e.clicks ?? 0}</span><br>
            <a class="tracking-link" href="${trackingLink}" target="_blank">${trackingLink}</a>

            <div class="event-actions">
              <button onclick="showQR('${escapeHtml(e.id)}')">Show QR</button>
              <a class="link-btn" href="${trackingLink}" target="_blank">Open Tracking Link</a>
            </div>
          </div>
        `;
      }).join('');
    }

    async function addCampaign() {
      clearMessage();

      const name = document.getElementById('campaign-name').value.trim();

      if (!name) {
        showMessage('Please enter a campaign name.', 'error');
        return;
      }

      const id = 'c' + Date.now();

      try {
        const res = await fetch(
          SUPABASE_URL + '/rest/v1/campaigns',
          {
            method: 'POST',
            headers,
            body: JSON.stringify({
              id: id,
              name: name
            })
          }
        );

        if (!res.ok) {
          const errText = await res.text();
          throw new Error('Could not add campaign: ' + errText);
        }

        document.getElementById('campaign-name').value = '';
        showMessage('Campaign added successfully.', 'success');
        await loadCampaigns();
      } catch (err) {
        showMessage(err.message, 'error');
      }
    }

    async function addEvent() {
      clearMessage();

      const name = document.getElementById('event-name').value.trim();
      let url = document.getElementById('event-url').value.trim();
      const campaignId = document.getElementById('campaign-select').value;

      if (!name || !url || !campaignId) {
        showMessage('Please complete all fields.', 'error');
        return;
      }

      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
      }

      const id = 'e' + Date.now();

      try {
        const res = await fetch(
          SUPABASE_URL + '/rest/v1/events',
          {
            method: 'POST',
            headers,
            body: JSON.stringify({
              id: id,
              name: name,
              url: url,
              campaign_id: campaignId,
              clicks: 0
            })
          }
        );

        if (!res.ok) {
          const errText = await res.text();
          throw new Error('Could not add event: ' + errText);
        }

        document.getElementById('event-name').value = '';
        document.getElementById('event-url').value = '';
        document.getElementById('campaign-select').value = '';

        showMessage('Event added successfully.', 'success');
        await loadEvents();
      } catch (err) {
        showMessage(err.message, 'error');
      }
    }

    function showQR(eventId) {
      const event = events.find(e => e.id === eventId);
      if (!event) return;

      activeQrEvent = event;

      const trackingLink = getTrackingLink(event.id);
      document.getElementById('qr-title').textContent = event.name;
      document.getElementById('qr-subtitle').textContent = trackingLink;

      const qrRender = document.getElementById('qr-render');
      qrRender.innerHTML = '';

      const canvas = document.createElement('canvas');
      qrRender.appendChild(canvas);

      QRCode.toCanvas(
        canvas,
        trackingLink,
        {
          width: 220,
          margin: 2
        },
        function(error) {
          if (error) {
            qrRender.innerHTML = '<p style="color:red;">Could not generate QR code.</p>';
          }
        }
      );

      document.getElementById('qr-modal').classList.add('open');
    }

    function closeQRModal() {
      document.getElementById('qr-modal').classList.remove('open');
      activeQrEvent = null;
    }

    function downloadQR() {
      const canvas = document.querySelector('#qr-render canvas');
      if (!canvas || !activeQrEvent) return;

      const link = document.createElement('a');
      link.download = activeQrEvent.name.replace(/[^a-z0-9]/gi, '_').toLowerCase() + '_qr.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    async function handleRedirect() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');

      if (!id) return false;

      document.body.innerHTML = '<div class="redirecting">Redirecting...</div>';

      try {
        const res = await fetch(
          SUPABASE_URL + '/rest/v1/events?id=eq.' + encodeURIComponent(id),
          { headers }
        );

        if (!res.ok) {
          const errText = await res.text();
          throw new Error('Could not load event for redirect: ' + errText);
        }

        const data = await res.json();

        if (!data.length) {
          document.body.innerHTML = '<div class="redirecting">Invalid link.</div>';
          return true;
        }

        const event = data[0];

        const updateRes = await fetch(
          SUPABASE_URL + '/rest/v1/events?id=eq.' + encodeURIComponent(id),
          {
            method: 'PATCH',
            headers,
            body: JSON.stringify({
              clicks: (event.clicks || 0) + 1
            })
          }
        );

        if (!updateRes.ok) {
          const errText = await updateRes.text();
          throw new Error('Could not update click count: ' + errText);
        }

        const clickLogRes = await fetch(
          SUPABASE_URL + '/rest/v1/click_events',
          {
            method: 'POST',
            headers,
            body: JSON.stringify({
              event_id: id
            })
          }
        );

        if (!clickLogRes.ok) {
          const errText = await clickLogRes.text();
          throw new Error('Could not log click event: ' + errText);
        }

        window.location.href = event.url;
      } catch (err) {
        document.body.innerHTML = '<div class="redirecting">Error tracking click: ' + escapeHtml(err.message) + '</div>';
      }

      return true;
    }

    async function init() {
      clearMessage();

      const isRedirect = await handleRedirect();
      if (isRedirect) return;

      await loadCampaigns();
      await loadEvents();
    }

    init();
  </script>
</body>
</html>
