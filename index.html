<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Tracker App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      background: #f7f7f7;
      color: #222;
    }

    h1, h2 {
      margin-bottom: 10px;
    }

    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 20px;
    }

    input, select, button {
      padding: 10px;
      margin: 6px 0;
      font-size: 14px;
      width: 100%;
      box-sizing: border-box;
    }

    button {
      cursor: pointer;
      background: #222;
      color: white;
      border: none;
      border-radius: 8px;
    }

    button:hover {
      background: #444;
    }

    .event {
      border-bottom: 1px solid #eee;
      padding: 10px 0;
    }

    .small {
      font-size: 12px;
      color: #666;
    }

    #message {
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 15px;
      display: none;
    }

    #message.show {
      display: block;
    }

    #message.error {
      background: #fdeaea;
      color: #a33;
    }

    #message.success {
      background: #eaf7ea;
      color: #2f6b2f;
    }
  </style>
</head>
<body>
  <h1>QR Tracker App</h1>
  <p>This version connects to Supabase and lets you view campaigns and add events.</p>

  <div id="message"></div>

  <div class="card">
    <h2>Add Event</h2>
    <input type="text" id="event-name" placeholder="Event name" />
    <input type="text" id="event-url" placeholder="Destination URL" />
    <select id="campaign-select">
      <option value="">Select a campaign</option>
    </select>
    <button onclick="addEvent()">Add Event</button>
  </div>

  <div class="card">
    <h2>Campaigns</h2>
    <div id="campaign-list">Loading campaigns...</div>
  </div>

  <div class="card">
    <h2>Events</h2>
    <div id="event-list">Loading events...</div>
  </div>

  <script>
    const SUPABASE_URL = 'https://fsnjpxyeqbctmffhkelv.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_5WySpn-4drNBRgC3c9Kcxg_GSj6ow-R';

    const headers = {
      apikey: SUPABASE_KEY,
      Authorization: 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      Prefer: 'return=representation'
    };

    let campaigns = [];
    let events = [];

    function showMessage(text, type = 'success') {
      const box = document.getElementById('message');
      box.textContent = text;
      box.className = 'show ' + type;
    }

    function clearMessage() {
      const box = document.getElementById('message');
      box.textContent = '';
      box.className = '';
    }

    async function loadCampaigns() {
      try {
        const res = await fetch(
          SUPABASE_URL + '/rest/v1/campaigns?select=*&order=created_at.asc',
          { headers }
        );

        if (!res.ok) {
          const errText = await res.text();
          throw new Error('Could not load campaigns: ' + errText);
        }

        campaigns = await res.json();
        renderCampaigns();
        populateCampaignDropdown();
      } catch (err) {
        showMessage(err.message, 'error');
        document.getElementById('campaign-list').innerHTML = 'Could not load campaigns.';
      }
    }

    function renderCampaigns() {
      const list = document.getElementById('campaign-list');

      if (!campaigns.length) {
        list.innerHTML = 'No campaigns found yet.';
        return;
      }

      list.innerHTML = campaigns.map(c => `
        <div class="event">
          <strong>${escapeHtml(c.name)}</strong><br>
          <span class="small">ID: ${escapeHtml(c.id)}</span>
        </div>
      `).join('');
    }

    function populateCampaignDropdown() {
      const select = document.getElementById('campaign-select');

      select.innerHTML = '<option value="">Select a campaign</option>' +
        campaigns.map(c => `<option value="${escapeHtml(c.id)}">${escapeHtml(c.name)}</option>`).join('');
    }

    async function loadEvents() {
      try {
        const res = await fetch(
          SUPABASE_URL + '/rest/v1/events?select=*&order=created_at.asc',
          { headers }
        );

        if (!res.ok) {
          const errText = await res.text();
          throw new Error('Could not load events: ' + errText);
        }

        events = await res.json();
        renderEvents();
      } catch (err) {
        showMessage(err.message, 'error');
        document.getElementById('event-list').innerHTML = 'Could not load events.';
      }
    }

    function getCampaignName(campaignId) {
      const campaign = campaigns.find(c => c.id === campaignId);
      return campaign ? campaign.name : 'Unknown campaign';
    }

    function renderEvents() {
      const list = document.getElementById('event-list');

      if (!events.length) {
        list.innerHTML = 'No events found yet.';
        return;
      }

      list.innerHTML = events.map(e => `
        <div class="event">
          <strong>${escapeHtml(e.name)}</strong><br>
          <span>${escapeHtml(e.url)}</span><br>
          <span class="small">Campaign: ${escapeHtml(getCampaignName(e.campaign_id))}</span><br>
          <span class="small">Clicks: ${e.clicks ?? 0}</span>
        </div>
      `).join('');
    }

    async function addEvent() {
      clearMessage();

      const name = document.getElementById('event-name').value.trim();
      let url = document.getElementById('event-url').value.trim();
      const campaignId = document.getElementById('campaign-select').value;

      if (!name || !url || !campaignId) {
        showMessage('Please complete all fields.', 'error');
        return;
      }

      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
      }

      const id = 'e' + Date.now();

      try {
        const res = await fetch(
          SUPABASE_URL + '/rest/v1/events',
          {
            method: 'POST',
            headers,
            body: JSON.stringify({
              id: id,
              name: name,
              url: url,
              campaign_id: campaignId,
              clicks: 0
            })
          }
        );

        if (!res.ok) {
          const errText = await res.text();
          throw new Error('Could not add event: ' + errText);
        }

        document.getElementById('event-name').value = '';
        document.getElementById('event-url').value = '';
        document.getElementById('campaign-select').value = '';

        showMessage('Event added successfully.', 'success');
        await loadEvents();
      } catch (err) {
        showMessage(err.message, 'error');
      }
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    async function init() {
      clearMessage();
      await loadCampaigns();
      await loadEvents();
    }

    init();
  </script>
</body>
</html>
